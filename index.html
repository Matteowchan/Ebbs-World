<head>

<meta name="description" content="creating moments of joy, a personal tracker">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
button { background: none; border: none; padding: 0; cursor: pointer; font: inherit; color: inherit; }
input, textarea, select { font: inherit; color: inherit; }

:root {
  --paper: #F0E5CD;
  --accent-1: #6B8A4F;
  --accent-2: #B07570;
  --ink-primary: #2E251C;
  --ink-secondary: #5A4A3A;
  --ink-faint: #8B7A65;
  --ink-very-faint: #B0A085;
  --line-color: rgba(139, 122, 101, 0.16);
  --card-border: rgba(46, 37, 28, 0.12);
  --card-border-strong: rgba(46, 37, 28, 0.25);
  --card-bg: rgba(46, 37, 28, 0.05);
  --card-active-bg: rgba(107, 138, 79, 0.18);
  --hover-bg: rgba(46, 37, 28, 0.04);
  --focus-bg: rgba(46, 37, 28, 0.07);
}

body {
  font-family: 'Lora', Georgia, serif;
  color: var(--ink-primary);
  background-color: rgba(46, 37, 28, 0.06);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.55;
}

.si { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 400; }
.s  { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; }

.page-bg {
  min-height: 100vh;
  padding: 32px 24px 60px;
  display: flex;
  justify-content: center;
}

.paper {
  width: 100%;
  max-width: 1100px;
  background-color: var(--paper);
  background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 31px, var(--line-color) 31px, var(--line-color) 32px);
  border: 0.5px solid rgba(46, 37, 28, 0.18);
  border-radius: 6px;
  padding: 32px 32px 36px 64px;
  position: relative;
}

.margin-line {
  position: absolute;
  left: 46px;
  top: 22px;
  bottom: 22px;
  width: 1.5px;
  background: var(--accent-2);
  opacity: 0.55;
}

.header-band {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 16px;
  flex-wrap: wrap;
}

.brand { display: flex; align-items: center; gap: 11px; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent-1);
  display: flex; align-items: center; justify-content: center;
  color: var(--paper);
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
}

.brand-name { font-size: 14px; font-weight: 500; }
.brand-tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 14px; color: var(--accent-2); }

.theme-picker { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.theme-picker-label { font-size: 11px; color: var(--ink-faint); margin-right: 2px; }

.theme-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 11px;
  font-size: 12px;
  border: 0.5px solid var(--card-border);
  border-radius: 5px;
  background: rgba(46, 37, 28, 0.04);
  cursor: pointer;
  user-select: none;
  transition: background .15s, border-color .15s;
  font-family: inherit;
  color: var(--ink-primary);
}
.theme-button:hover { background: var(--hover-bg); border-color: var(--card-border-strong); }
.theme-button-dots { display: flex; gap: 2px; }
.theme-button-dots .theme-dot { width: 8px; height: 8px; }
.theme-dot { border-radius: 50%; }
.theme-dot.bordered { border: 0.5px solid rgba(46, 37, 28, 0.3); }

.theme-dropdown-wrap { position: relative; }

.theme-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--paper);
  border: 0.5px solid var(--card-border-strong);
  border-radius: 6px;
  box-shadow: 0 4px 18px rgba(46, 37, 28, 0.18);
  padding: 6px;
  min-width: 240px;
  z-index: 100;
}

.theme-dropdown-section {
  font-size: 10.5px;
  color: var(--ink-faint);
  padding: 5px 9px;
  margin-top: 2px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.theme-dropdown-section:first-child { margin-top: 0; }

.theme-dropdown-divider {
  border-top: 0.5px solid rgba(46, 37, 28, 0.12);
  margin: 6px 0;
}

.theme-option {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 9px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: background .15s;
  user-select: none;
}
.theme-option:hover { background: var(--hover-bg); }
.theme-option.active { background: var(--card-active-bg); font-weight: 500; }
.theme-option-name { flex: 1; color: var(--ink-primary); }
.theme-option .theme-dot { width: 10px; height: 10px; }
.theme-option-edit {
  font-size: 11px;
  color: var(--ink-faint);
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
}
.theme-option-edit:hover { color: var(--accent-2); background: rgba(176, 117, 112, 0.1); }

.theme-add-new {
  padding: 9px 9px;
  font-size: 13px;
  color: var(--accent-2);
  cursor: pointer;
  border-radius: 4px;
  user-select: none;
}
.theme-add-new:hover { background: rgba(176, 117, 112, 0.1); }

.font-size-pill {
  display: inline-flex;
  border: 0.5px solid var(--card-border);
  border-radius: 5px;
  overflow: hidden;
  background: rgba(46, 37, 28, 0.04);
}
.font-size-button {
  padding: 6px 11px;
  font-size: 12px;
  cursor: pointer;
  border-right: 0.5px solid var(--card-border);
  transition: background .15s, color .15s;
  user-select: none;
  color: var(--ink-secondary);
  font-family: inherit;
}
.font-size-button:last-child { border-right: none; }
.font-size-button:hover { background: var(--hover-bg); color: var(--ink-primary); }
.font-size-button.active { background: var(--accent-1); color: var(--paper); }

/* Çizgi üstü yazı sorunu için zemin rengi maskelemesi */
.title-row,
.title-display,
.subtitle,
.section-label,
.verse-row,
.breadcrumb,
.year-section,
.verse,
.footer-actions {
  background-color: var(--paper);
}

/* Yazı boyutu ölçeklendirme */
body.font-small { font-size: 13px; }
body.font-medium { font-size: 14px; }
body.font-large { font-size: 16px; }

body.font-small .title-display { font-size: 38px; }
body.font-small .title-display.smaller { font-size: 32px; }
body.font-small .month-name { font-size: 19px; }
body.font-small .modal-title { font-size: 24px; }
body.font-small .verse { font-size: 13px; }

body.font-large .title-display { font-size: 52px; }
body.font-large .title-display.smaller { font-size: 44px; }
body.font-large .month-name { font-size: 24px; }
body.font-large .modal-title { font-size: 32px; }
body.font-large .verse { font-size: 16px; }
body.font-large .row-item, body.font-large .row-text { font-size: 15px; }
body.font-large .idea-title { font-size: 14px; }
body.font-large .meal-cell { font-size: 13px; }
body.font-large .day-num { font-size: 20px; }
body.font-large .book-title { font-size: 19px; }
body.font-large .intent-text { font-size: 16px; }
body.font-large .workout-text { font-size: 16px; }
body.font-large .breadcrumb { font-size: 13px; }
body.font-large .subtitle { font-size: 14px; }
body.font-large .section-label { font-size: 12px; }
body.font-large .month-stats { font-size: 12px; }
body.font-large .brand-tagline, body.font-large .brand-name { font-size: 16px; }
body.font-large .week-range { font-size: 16px; }
body.font-large .book-today-note { font-size: 14px; }
body.font-large .day-name { font-size: 12px; }

/* Toast bildirimi */
.app-toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink-primary);
  color: var(--paper);
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--font-sans);
  z-index: 200;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  box-shadow: 0 4px 18px rgba(46, 37, 28, 0.25);
}
.app-toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.app-toast.error {
  background: #8B3A2A;
}

.gratitude-section {
  margin-top: 26px;
}

.gratitude-card {
  background: var(--card-bg);
  border: 0.5px solid var(--card-border);
  border-radius: 6px;
  padding: 14px 16px;
}

.gratitude-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 5px 0;
  font-size: 13px;
}

.gratitude-num {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  color: var(--accent-2);
  font-size: 15px;
  min-width: 18px;
  flex-shrink: 0;
}

.gratitude-text {
  flex: 1;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-primary);
  outline: none;
  border-radius: 3px;
  padding: 2px 4px;
  margin: -2px -4px;
  cursor: text;
  min-height: 1em;
  line-height: 1.5;
}

.gratitude-text:hover { background: var(--hover-bg); }
.gratitude-text:focus { background: var(--focus-bg); }
.gratitude-text:empty::before {
  content: attr(data-placeholder);
  color: var(--ink-very-faint);
  pointer-events: none;
  font-style: italic;
}

.gratitude-row .row-delete { font-size: 14px; align-self: center; }

@media (max-width: 460px) {
  .gratitude-card { padding: 12px 14px; }
  .gratitude-row { padding: 4px 0; gap: 10px; }
}

.verse-row {
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid rgba(46,37,28,0.15);
}

.verse, .editable {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  outline: none;
  border-radius: 3px;
  padding: 2px 4px;
  margin: -2px -4px;
  transition: background .12s;
  cursor: text;
}
.verse {
  font-size: 14px;
  color: var(--ink-faint);
  line-height: 1.5;
  display: inline-block;
  min-width: 200px;
}
.verse:hover, .editable:hover { background: var(--hover-bg); }
.verse:focus, .editable:focus { background: var(--focus-bg); color: var(--ink-primary); }
.verse:empty::before, .editable:empty::before {
  content: attr(data-placeholder);
  color: var(--ink-very-faint);
  pointer-events: none;
}

.breadcrumb {
  font-size: 12px;
  color: var(--ink-faint);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
}
.breadcrumb-item {
  cursor: pointer;
  transition: color .15s, background .15s;
  padding: 2px 4px;
  margin: 0 -2px;
  border-radius: 3px;
}
.breadcrumb-item:hover { color: var(--accent-2); background: rgba(176, 117, 112, 0.08); }
.breadcrumb-sep { margin: 0 4px; color: var(--ink-very-faint); }

.back-button {
  font-size: 12px;
  color: var(--accent-2);
  cursor: pointer;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 4px;
  margin-right: 10px;
  border: 0.5px solid rgba(176, 117, 112, 0.4);
  background: rgba(176, 117, 112, 0.06);
  transition: all .15s;
  user-select: none;
}
.back-button:hover {
  background: rgba(176, 117, 112, 0.16);
  border-color: var(--accent-2);
}

.title-display {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  font-size: 44px;
  line-height: 1;
  color: var(--ink-primary);
  outline: none;
  cursor: text;
  border-radius: 4px;
  padding: 0 4px;
  margin: 0 -4px;
}
.title-display:hover { background: var(--hover-bg); }
.title-display:focus { background: var(--focus-bg); }
.title-display.smaller { font-size: 38px; }

.title-row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; flex-wrap: wrap; }
.title-status { font-size: 12px; color: var(--accent-1); }
.subtitle { font-size: 13px; color: var(--ink-secondary); margin-bottom: 6px; }
.section-label { font-size: 11px; color: var(--ink-faint); font-weight: 500; margin-bottom: 10px; letter-spacing: 0.2px; }

.year-section { margin-bottom: 22px; }

.month-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}

.month-card {
  background: var(--card-bg);
  border: 0.5px solid var(--card-border);
  border-radius: 6px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  position: relative;
}
.month-card:hover { border-color: var(--card-border-strong); }
.month-card:active { transform: translateY(1px); }
.month-card.active {
  background: var(--card-active-bg);
  border: 1px solid var(--accent-1);
}
.month-card.future {
  background: rgba(245, 235, 210, 0.5);
  border: 0.5px dashed rgba(176, 117, 112, 0.4);
}

.month-card-badge {
  position: absolute; top: 9px; right: 11px;
  font-size: 11px; color: var(--accent-1);
}

.month-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 21px;
  color: var(--ink-primary);
  margin-bottom: 8px;
}
.month-name.muted { color: var(--ink-secondary); }

.bar {
  background: rgba(46,37,28,0.08);
  height: 4px; border-radius: 2px; overflow: hidden;
  margin-bottom: 8px;
}
.bar-fill { height: 100%; background: var(--accent-1); transition: width .3s; }
.bar-thin { height: 3px; }
.bar-empty { background: rgba(46,37,28,0.05); }

.month-stats {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--ink-secondary);
}

.future-summary {
  font-size: 11px;
  color: var(--accent-2);
  margin-bottom: 4px;
}
.future-list {
  font-size: 11px;
  color: var(--ink-secondary);
  line-height: 1.55;
}
.future-add {
  font-size: 11px;
  color: var(--accent-2);
  margin-top: 2px;
}

.detail-section {
  border-top: 0.5px solid rgba(46, 37, 28, 0.2);
  padding-top: 24px;
  margin-top: 4px;
}

.weeks-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 28px;
}

.week-card {
  background: var(--card-bg);
  border: 0.5px solid var(--card-border);
  border-radius: 6px;
  padding: 12px 13px;
  cursor: pointer;
  transition: border-color .15s;
}
.week-card:hover { border-color: var(--card-border-strong); }
.week-card.active { background: var(--card-active-bg); border: 1px solid var(--accent-1); }
.week-card.future { background: rgba(245, 235, 210, 0.5); border: 0.5px dashed rgba(176, 117, 112, 0.4); }

.week-label { font-size: 11px; color: var(--ink-secondary); margin-bottom: 4px; }
.week-label.active { color: var(--accent-1); }
.week-label.muted { color: var(--ink-faint); }
.week-range { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 14px; color: var(--ink-primary); margin-bottom: 8px; }
.week-range.muted { color: var(--ink-secondary); }

.kanban {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 9px;
  margin-bottom: 8px;
}

.kanban-col-header {
  font-size: 11px;
  color: var(--ink-faint);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 0.5px solid rgba(46,37,28,0.15);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.kanban-col-header.demleniyor { color: var(--accent-2); }
.kanban-col-header.paylasildi { color: var(--accent-1); }

.idea-card {
  background: var(--card-bg);
  border-radius: 5px;
  padding: 10px 11px;
  margin-bottom: 6px;
  cursor: pointer;
  position: relative;
  transition: background .15s;
}
.idea-card:hover { background: rgba(46,37,28,0.09); }
.idea-card.published { background: var(--card-active-bg); }

.idea-title {
  font-size: 12px;
  line-height: 1.4;
  color: var(--ink-primary);
  outline: none;
  cursor: text;
  border-radius: 3px;
  padding: 2px 4px;
  margin: -2px -4px;
}
.idea-title:focus { background: var(--focus-bg); }
.idea-date { font-size: 11px; color: var(--ink-faint); margin-top: 3px; }
.idea-date.published { color: var(--accent-1); }

.idea-card-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}

.status-select {
  font-size: 10.5px;
  background: transparent;
  border: 0.5px solid var(--card-border);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--ink-secondary);
  cursor: pointer;
  font-family: inherit;
}

.idea-delete {
  font-size: 12px;
  color: var(--ink-very-faint);
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s;
}
.idea-card:hover .idea-delete { opacity: 0.6; }
.idea-delete:hover { opacity: 1; color: var(--accent-2); }

.add-button {
  font-size: 12px;
  color: var(--accent-2);
  cursor: pointer;
  margin-top: 4px;
  padding: 3px 5px;
  border-radius: 3px;
  display: inline-block;
  user-select: none;
}
.add-button:hover { background: rgba(176, 117, 112, 0.1); }

.row-item {
  display: flex;
  gap: 9px;
  align-items: center;
  margin-bottom: 7px;
  font-size: 13px;
  color: var(--ink-primary);
}

.checkbox {
  width: 14px; height: 14px;
  border-radius: 3px;
  flex-shrink: 0;
  cursor: pointer;
  background: rgba(245, 235, 210, 0.6);
  border: 1px solid var(--ink-very-faint);
  transition: all .15s;
}
.checkbox.checked {
  background: var(--accent-1);
  border-color: var(--accent-1);
}

.row-text {
  flex: 1;
  cursor: text;
  outline: none;

<div class="page-bg">
  <div class="paper" id="paper">
    <div class="margin-line"></div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-host"></div>

<script>
'use strict';

const STORAGE_KEY = 'ebbsWorld_v1';

const PRESET_THEMES = [
  { name: 'Sage Mead',     paper: '#F0E5CD', accent1: '#6B8A4F', accent2: '#B07570' },
  { name: 'Autumn Embers', paper: '#EDDFC0', accent1: '#B8702E', accent2: '#8B3A2A' },
  { name: 'Twilight Ink',  paper: '#E8E2D1', accent1: '#3A4A6E', accent2: '#7B6E8B' },
  { name: 'Forest Walk',   paper: '#EBE4CD', accent1: '#4A6E3D', accent2: '#A77555' }
];

const MONTHS_TR = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_TR_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_TR_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_TR_LONG = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const STATUSES = [
  { id: 'fikir',       label: 'Idea' },
  { id: 'demleniyor',  label: 'Brewing' },
  { id: 'cekildi',     label: 'Captured' },
  { id: 'paylasildi',  label: 'Shared' }
];

function uid() { return Math.random().toString(36).slice(2, 10); }
function pad(n) { return String(n).padStart(2, '0'); }

function dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function parseDateKey(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function monthKey(year, month) { return year + '-' + pad(month+1); }

function getMonday(d) {
  const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function weekKey(d) {
  const monday = getMonday(d);
  const wn = getISOWeek(monday);
  return monday.getFullYear() + '-W' + pad(wn);
}

function daysInMonth(year, month) { return new Date(year, month+1, 0).getDate(); }

function defaultState() {
  return {
    meta: {
      name: "Ebb's World",
      tagline: 'creating moments of joy',
      initial: 'E',
      activeTheme: 'Sage Mead',
      customThemes: [],
      globalVerse: '',
      fontSize: 'medium'
    },
    months: {},
    weeks: {},
    days: {},
    books: []
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const fresh = defaultState();
    return Object.assign({}, fresh, parsed, {
      meta: Object.assign({}, fresh.meta, parsed.meta || {}),
      months: parsed.months || {},
      weeks: parsed.weeks || {},
      days: parsed.days || {},
      books: parsed.books || []
    });
  } catch (e) {
    return defaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    pushToCloudDebounced();
    return true;
  } catch (e) {
    console.error('Save failed:', e);
    showToast('save error, ' + e.message, 'error');
    return false;
  }
}

function getMonthData(year, month) {
  const k = monthKey(year, month);
  if (!state.months[k]) state.months[k] = {};
  const md = state.months[k];
  if (!Array.isArray(md.contentIdeas)) md.contentIdeas = [];
  if (!Array.isArray(md.wishes)) md.wishes = [];
  if (typeof md.verse !== 'string') md.verse = '';
  if (!Array.isArray(md.gratitude)) md.gratitude = [];
  return md;
}

function getWeekData(d) {
  const k = weekKey(d);
  if (!state.weeks[k]) state.weeks[k] = {};
  const wd = state.weeks[k];
  if (typeof wd.intent !== 'string') wd.intent = '';
  if (!Array.isArray(wd.goals)) wd.goals = [];
  if (typeof wd.meals !== 'object' || !wd.meals) wd.meals = {};
  if (typeof wd.verse !== 'string') wd.verse = '';
  if (!Array.isArray(wd.gratitude)) wd.gratitude = [];
  return wd;
}

function getDayData(d) {
  const k = dateKey(d);
  if (!state.days[k]) state.days[k] = {};
  const dd = state.days[k];
  if (!Array.isArray(dd.todos)) dd.todos = [];
  if (typeof dd.workout !== 'string') dd.workout = '';
  if (typeof dd.reading !== 'object' || !dd.reading) dd.reading = { bookId: null, todayPages: '', note: '' };
  if (typeof dd.verse !== 'string') dd.verse = '';
  if (!Array.isArray(dd.gratitude)) dd.gratitude = [];
  return dd;
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  return { r: parseInt(hex.slice(0,2),16), g: parseInt(hex.slice(2,4),16), b: parseInt(hex.slice(4,6),16) };
}

function mix(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a.r*(1-t) + b.r*t);
  const g = Math.round(a.g*(1-t) + b.g*t);
  const bl = Math.round(a.b*(1-t) + b.b*t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

function el(tag, props, children) {
  const e = document.createElement(tag);
  if (props) {
    for (const k in props) {
      if (k === 'class') e.className = props[k];
      else if (k === 'html') e.innerHTML = props[k];
      else if (k === 'text') e.textContent = props[k];
      else if (k.startsWith('on') && typeof props[k] === 'function') {
        e.addEventListener(k.slice(2).toLowerCase(), props[k]);
      } else if (k === 'data') {
        for (const dk in props[k]) e.dataset[dk] = props[k][dk];
      } else if (k === 'style' && typeof props[k] === 'object') {
        Object.assign(e.style, props[k]);
      } else {
        e.setAttribute(k, props[k]);
      }
    }
  }
  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(c => {
      if (c == null || c === false) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
}

function bindEditable(node, getter, setter, opts) {
  opts = opts || {};
  node.contentEditable = 'true';
  node.spellcheck = false;
  node.textContent = getter() || '';
  node.addEventListener('blur', () => {
    const val = (node.textContent || '').replace(/\s+/g,' ').trim();
    setter(val);
    saveState();
  });
  if (!opts.multiline) {
    node.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); node.blur(); }
      if (e.key === 'Escape') { node.textContent = getter() || ''; node.blur(); }
    });
  } else {
    node.addEventListener('keydown', e => {
      if (e.key === 'Escape') { node.textContent = getter() || ''; node.blur(); }
    });
  }
  return node;
}

function renderThemeDropdown() {
  const wrap = document.createElement('div');
  wrap.className = 'theme-dropdown-wrap';

  btn.className = 'theme-button';

    d.className = 'theme-dot' + (i === 0 ? ' bordered' : '');

    dots.appendChild(d);
  });
  btn.appendChild(dots);

  const lbl = document.createElement('span');
  lbl.textContent = 'theme, ' + t.name;
  btn.appendChild(lbl);

  let dropdown = null;
  let outsideHandler = null;

  function close() {
    if (dropdown && dropdown.parentNode) dropdown.parentNode.removeChild(dropdown);
    dropdown = null;
    if (outsideHandler) {
      document.removeEventListener('mousedown', outsideHandler);
      outsideHandler = null;
    }
  }

  function open() {
    dropdown = buildThemeDropdownPanel(close);
    wrap.appendChild(dropdown);
    setTimeout(() => {
      outsideHandler = (e) => {
        const modalHost = document.getElementById('modal-host');
        if (!wrap.contains(e.target) && !(modalHost && modalHost.contains(e.target))) {
          close();
        }
      };
      document.addEventListener('mousedown', outsideHandler);
    }, 0);
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (dropdown) close();
    else open();
  });

  wrap.appendChild(btn);
  return wrap;
}

function monthDensity(year, month) {
  const days = daysInMonth(year, month);
  let filled = 0, goalsDone = 0, goalsTotal = 0;
  for (let d = 1; d <= days; d++) {
    const dt = new Date(year, month, d);
    const dk = dateKey(dt);
    const dd = state.days[dk];
    if (dd) {
      const has = (dd.todos && dd.todos.length) || (dd.workout && dd.workout.trim()) || (dd.reading && (dd.reading.todayPages || dd.reading.note));
      if (has) filled++;
    }
  }
  // Count week goals that fall in this month
  for (const wk in state.weeks) {
    const w = state.weeks[wk];
    if (w.goals && w.goals.length) {
      // Determine if this week is in the month: parse W key
      const m = wk.match(/^(\d{4})-W(\d+)$/);
      if (m) {
        const y = parseInt(m[1], 10);
        const wn = parseInt(m[2], 10);
        // Reconstruct Monday of that week
        const jan4 = new Date(y, 0, 4);
        const j4Mon = getMonday(jan4);
        const monday = new Date(j4Mon.getTime() + (wn-1)*7*86400000);
        if (monday.getFullYear() === year && monday.getMonth() === month) {
          goalsTotal += w.goals.length;
          goalsDone += w.goals.filter(g => g.done).length;
        }
      }
    }
  }
  return { filled, total: days, goalsDone, goalsTotal };
}

function getWeeksOfMonth(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const set = new Set();
  const arr = [];
  for (let d = new Date(first); d <= last; d.setDate(d.getDate()+1)) {
    const m = getMonday(d);
    const k = weekKey(m);
    if (!set.has(k)) { set.add(k); arr.push(new Date(m)); }
  }
  return arr;
}

    const dd = state.days[dateKey(d)];
    const todos = (dd && dd.todos) || [];
    const todosT = todos.length, todosD = todos.filter(t => t.done).length;

    daysWrap.appendChild(card);

  wrap.appendChild(renderGratitudeSection(wd));

  return wrap;

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ebbs-world-' + dateKey(new Date()) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (confirm('Your current data will be replaced. Continue?')) {
          const fresh = defaultState();
          state = Object.assign({}, fresh, data, {
            meta: Object.assign({}, fresh.meta, data.meta || {}),
            months: data.months || {},
            weeks: data.weeks || {},
            days: data.days || {},
            books: data.books || []
          });
          saveState();
          applyTheme();
          render();
        }
      } catch (err) {
        alert('Could not read file. JSON format may be broken.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData() {
  if (confirm('All data will be deleted and the app will reset. This cannot be undone. Are you sure?')) {
    state = defaultState();
    saveState();
    applyTheme();
    render();
  }
}

}

function openCustomThemeModal(existingName) {
  const host = document.getElementById('modal-host');
  host.innerHTML = '';

  let initial = { paper: '#F0E5CD', accent1: '#6B8A4F', accent2: '#B07570', name: '' };
  if (existingName) {
    const t = state.meta.customThemes.find(x => x.name === existingName);
    if (t) initial = { paper: t.paper, accent1: t.accent1, accent2: t.accent2, name: t.name };
  }

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';

  const modal = document.createElement('div');
  modal.className = 'modal';

  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = existingName ? 'Edit theme' : 'Create custom theme';
  modal.appendChild(title);

  const sub = document.createElement('div');
  sub.className = 'modal-sub';
  sub.textContent = 'Pick three colors. Page color, first accent, second accent.';
  modal.appendChild(sub);

  // İsim
  const nameRow = document.createElement('div');
  nameRow.className = 'color-row';
  const nameLabel = document.createElement('label');
  nameLabel.textContent = 'Theme name';
  nameRow.appendChild(nameLabel);
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = initial.name;
  nameInput.placeholder = 'e.g., Plum Twilight';
  nameRow.appendChild(nameInput);
  modal.appendChild(nameRow);

  // Renk girişleri (DOM referansları korunuyor)
  function makeColorInputs(initialVal) {
    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = initialVal;
    const textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.value = initialVal;
    textInput.placeholder = '#000000';
    textInput.maxLength = 7;
    textInput.spellcheck = false;
    textInput.autocapitalize = 'none';
    textInput.autocomplete = 'off';
    return { colorInput, textInput };
  }

  function normalizeHex(v) {
    v = (v || '').trim();
    if (!v) return null;
    if (/^[0-9A-Fa-f]{6}$/.test(v)) v = '#' + v;
    if (/^#[0-9A-Fa-f]{3}$/.test(v)) v = '#' + v.slice(1).split('').map(c => c + c).join('');
    return /^#[0-9A-Fa-f]{6}$/.test(v) ? v.toLowerCase() : null;
  }

  function syncPair(colorInput, textInput) {
    colorInput.addEventListener('input', () => {
      textInput.value = colorInput.value;
      updatePreview();
    });
    textInput.addEventListener('input', () => {
      const norm = normalizeHex(textInput.value);
      if (norm) {
        colorInput.value = norm;
        updatePreview();
      }
    });
    textInput.addEventListener('blur', () => {
      const norm = normalizeHex(textInput.value);
      if (norm) {
        textInput.value = norm;
      } else {
        textInput.value = colorInput.value;
      }
    });
  }

  const paper = makeColorInputs(initial.paper);
  const a1 = makeColorInputs(initial.accent1);
  const a2 = makeColorInputs(initial.accent2);

  function makeRow(label, pair) {
    const row = document.createElement('div');
    row.className = 'color-row';
    const lbl = document.createElement('label');
    lbl.textContent = label;
    row.appendChild(lbl);
    row.appendChild(pair.colorInput);
    row.appendChild(pair.textInput);
    return row;
  }

  modal.appendChild(makeRow('Page color', paper));
  modal.appendChild(makeRow('Accent 1', a1));
  modal.appendChild(makeRow('Accent 2', a2));

  syncPair(paper.colorInput, paper.textInput);
  syncPair(a1.colorInput, a1.textInput);
  syncPair(a2.colorInput, a2.textInput);

  // Önizleme
  const preview = document.createElement('div');
  preview.className = 'modal-preview';
  modal.appendChild(preview);

  function updatePreview() {
    preview.innerHTML = '';
    preview.style.backgroundColor = paper.colorInput.value;
    const dot1 = document.createElement('div');
    dot1.className = 'modal-preview-dot';
    dot1.style.background = a1.colorInput.value;
    const dot2 = document.createElement('div');
    dot2.className = 'modal-preview-dot';
    dot2.style.background = a2.colorInput.value;
    const txt = document.createElement('div');
    txt.className = 'modal-preview-text';
    txt.style.color = a2.colorInput.value;
    txt.textContent = 'creating moments of joy';
    preview.appendChild(dot1);
    preview.appendChild(dot2);
    preview.appendChild(txt);
  }
  updatePreview();

  // Aksiyonlar
  const actions = document.createElement('div');
  actions.className = 'modal-actions';

  if (existingName) {
    const delBtn = document.createElement('button');
    delBtn.className = 'btn danger';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => {
      state.meta.customThemes = state.meta.customThemes.filter(t => t.name !== existingName);
      if (state.meta.activeTheme === existingName) state.meta.activeTheme = 'Sage Mead';
      saveState();
      host.innerHTML = '';
      applyTheme();
      render();
    };
    actions.appendChild(delBtn);
  }

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => { host.innerHTML = ''; };
  actions.appendChild(cancelBtn);

  const submitBtn = document.createElement('button');
  submitBtn.className = 'btn primary';
  submitBtn.textContent = existingName ? 'Save' : 'Create';
  submitBtn.onclick = () => {
    try {
      const enteredName = (nameInput.value || '').trim();
      const finalName = enteredName || ('Custom ' + ((state.meta.customThemes || []).length + 1));
      const finalPaper = normalizeHex(paper.textInput.value) || paper.colorInput.value;
      const finalA1 = normalizeHex(a1.textInput.value) || a1.colorInput.value;
      const finalA2 = normalizeHex(a2.textInput.value) || a2.colorInput.value;

      // Defansif, dizinin varlığını garanti et
      if (!Array.isArray(state.meta.customThemes)) state.meta.customThemes = [];

      // İsim çakışması kontrolü (yeni oluşturmada)
      if (!existingName) {
        const allNames = [...PRESET_THEMES.map(t => t.name), ...state.meta.customThemes.map(t => t.name)];
        if (allNames.indexOf(finalName) !== -1) {
          showToast('a theme with this name already exists', 'error');
          nameInput.focus();
          return;
        }
      }

      if (existingName) {
        const t = state.meta.customThemes.find(x => x.name === existingName);
        if (t) {
          t.name = finalName;
          t.paper = finalPaper;
          t.accent1 = finalA1;
          t.accent2 = finalA2;
        }
        if (state.meta.activeTheme === existingName) state.meta.activeTheme = finalName;
      } else {
        state.meta.customThemes.push({
          name: finalName,
          paper: finalPaper,
          accent1: finalA1,
          accent2: finalA2
        });
        state.meta.activeTheme = finalName;
      }

      const ok = saveState();
      host.innerHTML = '';
      applyTheme();
      render();
      if (ok) showToast(existingName ? 'theme updated, ' + finalName : 'theme saved, ' + finalName);
    } catch (err) {
      console.error(err);
      showToast('error, ' + err.message, 'error');
    }
  };
  actions.appendChild(submitBtn);
  modal.appendChild(actions);

  backdrop.appendChild(modal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) host.innerHTML = ''; });
  host.appendChild(backdrop);

  setTimeout(() => nameInput.focus(), 50);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const host = document.getElementById('modal-host');
    if (host.firstChild) { host.innerHTML = ''; return; }

    // Eğer bir alan düzenleniyorsa, esc orayı kapatır, navigation tetiklenmez
    const active = document.activeElement;
    if (active && (active.contentEditable === 'true' || active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) {
      return;
    }

    // Bir seviye geri git
    if (viewState.level === 'day') { viewState.level = 'week'; render(); }
    else if (viewState.level === 'week') { viewState.level = 'month'; render(); }
    else if (viewState.level === 'month') { viewState.level = 'year'; render(); }
  }
});

// ============================================================
// Cloud sync (Supabase)
// ============================================================
const SUPABASE_URL = 'https://jmzutaadfonaewepexfq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Lz8JzJSn2WHV6Rr4NOPl4Q_VspJtlFz';
const CLOUD_SETTINGS_KEY = 'ebbsWorld_cloud';
const CLIENT_ID = (() => {
  const k = 'ebbsWorld_clientId';
  let id = localStorage.getItem(k);
  if (!id) {
    id = 'c_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem(k, id);
  }
  return id;
})();

let cloudClient = null;
let cloudVaultKey = null;
let cloudChannel = null;
let cloudPushTimeout = null;
let cloudStatus = 'idle';
let cloudStatusMsg = '';
let cloudIsApplyingRemote = false;

function getCloudSettings() {
  let stored = {};
  try { stored = JSON.parse(localStorage.getItem(CLOUD_SETTINGS_KEY) || '{}'); }
  catch { stored = {}; }
  return {
    url: SUPABASE_URL,
    anonKey: SUPABASE_KEY,
    vaultKey: stored.vaultKey || ''
  };
}
function setCloudSettings(s) {
  localStorage.setItem(CLOUD_SETTINGS_KEY, JSON.stringify({ vaultKey: s.vaultKey || '' }));
}
function clearCloudSettings() { localStorage.removeItem(CLOUD_SETTINGS_KEY); }

function cloudStatusFooterText() {
  const s = getCloudSettings();
  if (!s.vaultKey) return 'data saved in your browser';
  if (cloudStatus === 'connecting') return 'cloud, connecting';
  if (cloudStatus === 'syncing') return 'cloud, syncing';
  if (cloudStatus === 'connected') return 'cloud, synced';
  if (cloudStatus === 'error') return 'cloud, error';
  return 'cloud, idle';
}

function setCloudStatus(s, msg) {
  cloudStatus = s;
  cloudStatusMsg = msg || '';
  const elS = document.getElementById('cloud-status-text');
  if (elS) elS.textContent = cloudStatusFooterText();
}

async function loadSupabaseLib() {
  if (window.supabase && window.supabase.createClient) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Could not load Supabase library, check internet'));
    document.head.appendChild(s);
  });
  if (!window.supabase || !window.supabase.createClient) {
    throw new Error('Supabase library loaded but not usable');
  }
}

async function initCloudSync() {
  const s = getCloudSettings();
  if (!s.url || !s.anonKey || !s.vaultKey) { setCloudStatus('idle'); return; }
  try {
    setCloudStatus('connecting');
    await loadSupabaseLib();
    cloudClient = window.supabase.createClient(s.url, s.anonKey);
    cloudVaultKey = s.vaultKey;
    await pullFromCloud();
    subscribeToCloudChanges();
    setCloudStatus('connected');
  } catch (err) {
    console.error('Cloud sync init failed:', err);
    setCloudStatus('error', err.message || String(err));
  }
}

async function pullFromCloud() {
  if (!cloudClient || !cloudVaultKey) return;
  const { data, error } = await cloudClient
    .from('vault')
    .select('data, updated_at, last_client')
    .eq('vault_key', cloudVaultKey)
    .maybeSingle();
  if (error) throw error;
  if (data && data.data) {
    cloudIsApplyingRemote = true;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data.data));
      state = loadState();
      render();
    } finally { cloudIsApplyingRemote = false; }
  } else {
    await pushToCloudNow();
  }
}

function pushToCloudDebounced() {
  if (!cloudClient || !cloudVaultKey) return;
  if (cloudIsApplyingRemote) return;
  clearTimeout(cloudPushTimeout);
  cloudPushTimeout = setTimeout(pushToCloudNow, 800);
}

async function pushToCloudNow() {
  if (!cloudClient || !cloudVaultKey) return;
  try {
    setCloudStatus('syncing');
    const { error } = await cloudClient
      .from('vault')
      .upsert({
        vault_key: cloudVaultKey,
        data: state,
        last_client: CLIENT_ID,
        updated_at: new Date().toISOString()
      });
    if (error) throw error;
    setCloudStatus('connected');
  } catch (err) {
    console.error('Cloud push failed:', err);
    setCloudStatus('error', err.message || String(err));
  }
}

function subscribeToCloudChanges() {
  if (!cloudClient || !cloudVaultKey) return;
  if (cloudChannel) { try { cloudChannel.unsubscribe(); } catch {} }
  cloudChannel = cloudClient
    .channel('vault-' + cloudVaultKey)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'vault',
      filter: 'vault_key=eq.' + cloudVaultKey
    }, payload => {
      const newRow = payload.new;
      if (!newRow || !newRow.data) return;
      if (newRow.last_client === CLIENT_ID) return;
      cloudIsApplyingRemote = true;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newRow.data));
        state = loadState();
        render();
        showToast('updated from another device');
      } finally { cloudIsApplyingRemote = false; }
    })
    .subscribe();
}

function disconnectCloud() {
  if (cloudChannel) { try { cloudChannel.unsubscribe(); } catch {} cloudChannel = null; }
  cloudClient = null;
  cloudVaultKey = null;
  clearCloudSettings();
  setCloudStatus('idle');
  const elS = document.getElementById('cloud-status-text');
  if (elS) elS.textContent = 'data saved in your browser';
}

function openCloudSyncModal() {
  const host = document.getElementById('modal-host');
  host.innerHTML = '';
  const settings = getCloudSettings();
  const isConfigured = !!settings.vaultKey;

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.maxWidth = '460px';

  const titleEl = document.createElement('div');
  titleEl.className = 'modal-title';
  titleEl.textContent = 'Cloud sync';
  modal.appendChild(titleEl);

  const subEl = document.createElement('div');
  subEl.className = 'modal-sub';
  subEl.textContent = isConfigured
    ? 'Connected. Use the same vault key on every device to share data.'
    : 'Set a vault key to sync across devices. Use the same key everywhere.';
  modal.appendChild(subEl);

  function makeInputRow(label, value, placeholder) {
    const row = document.createElement('div');
    row.className = 'color-row';
    const lbl = document.createElement('label');
    lbl.textContent = label;
    row.appendChild(lbl);
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = value || '';
    if (placeholder) inp.placeholder = placeholder;
    inp.spellcheck = false;
    inp.autocapitalize = 'none';
    inp.autocomplete = 'off';
    inp.style.flex = '1';
    inp.style.minWidth = '0';
    row.appendChild(inp);
    return { row, inp };
  }

  const vaultR = makeInputRow('Vault key', settings.vaultKey, 'paste or generate');
  modal.appendChild(vaultR.row);

  const genWrap = document.createElement('div');
  genWrap.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin:-6px 2px 14px;font-size:12px;font-family:Lora,serif;font-style:italic;';
  const genLink = document.createElement('span');
  genLink.style.cssText = 'cursor:pointer;color:var(--accent-2);';
  genLink.textContent = 'generate new vault key';
  genLink.onclick = () => {
    vaultR.inp.value = 'v_' + Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
  };
  genWrap.appendChild(genLink);
  if (isConfigured && settings.vaultKey) {
    const copyLink = document.createElement('span');
    copyLink.style.cssText = 'cursor:pointer;color:var(--accent-2);';
    copyLink.textContent = 'copy current key';
    copyLink.onclick = async () => {
      try {
        await navigator.clipboard.writeText(settings.vaultKey);
        showToast('vault key copied');
      } catch {
        showToast('copy failed, select manually', 'error');
      }
    };
    genWrap.appendChild(copyLink);
  }
  modal.appendChild(genWrap);

  if (isConfigured) {
    const statusBox = document.createElement('div');
    statusBox.style.cssText = 'padding:10px 12px;background:rgba(107,138,79,0.06);border-left:3px solid var(--accent-1);font-size:13px;font-family:Lora,serif;font-style:italic;color:var(--ink-soft);margin:0 0 14px;';
    let label = 'idle';
    if (cloudStatus === 'connected') label = 'connected and synced';
    else if (cloudStatus === 'connecting') label = 'connecting';
    else if (cloudStatus === 'syncing') label = 'syncing';
    else if (cloudStatus === 'error') label = 'error, ' + (cloudStatusMsg || 'unknown');
    statusBox.textContent = 'Status, ' + label;
    modal.appendChild(statusBox);
  }

  const help = document.createElement('div');
  help.style.cssText = 'font-size:12px;font-family:Lora,serif;color:var(--ink-soft);line-height:1.55;margin-bottom:16px;padding:10px 12px;background:rgba(176,117,112,0.05);border-radius:4px;';
  help.textContent = 'First device, generate a new vault key. Other devices, paste the same key. Anyone with this key can read your data, so keep it private.';
  modal.appendChild(help);

  const actions = document.createElement('div');
  actions.className = 'modal-actions';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn';
  cancelBtn.textContent = 'cancel';
  cancelBtn.onclick = () => { host.innerHTML = ''; };
  actions.appendChild(cancelBtn);

  if (isConfigured) {
    const disconnectBtn = document.createElement('button');
    disconnectBtn.className = 'btn danger';
    disconnectBtn.textContent = 'disconnect';
    disconnectBtn.onclick = () => {
      if (confirm('Stop cloud sync? Local data is kept on this device.')) {
        disconnectCloud();
        host.innerHTML = '';
        showToast('cloud sync disconnected');
      }
    };
    actions.appendChild(disconnectBtn);
  }

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn primary';
  saveBtn.textContent = isConfigured ? 'update and reconnect' : 'save and connect';
  saveBtn.onclick = async () => {
    const vaultKey = vaultR.inp.value.trim();
    if (!vaultKey) { showToast('vault key required', 'error'); return; }
    if (vaultKey.length < 6) { showToast('vault key too short, use 6+ characters', 'error'); return; }
    setCloudSettings({ vaultKey });
    host.innerHTML = '';
    showToast('connecting...');
    if (cloudChannel) { try { cloudChannel.unsubscribe(); } catch {} cloudChannel = null; }
    cloudClient = null;
    cloudVaultKey = null;
    try {
      await initCloudSync();
      if (cloudStatus === 'connected') showToast('cloud sync connected');
      else if (cloudStatus === 'error') showToast('error, ' + cloudStatusMsg, 'error');
    } catch (err) {
      showToast('connection error, ' + (err.message || err), 'error');
    }
  };
  actions.appendChild(saveBtn);
  modal.appendChild(actions);

  backdrop.appendChild(modal);
  backdrop.onclick = e => { if (e.target === backdrop) host.innerHTML = ''; };
  host.appendChild(backdrop);
}

applyTheme();
applyFontSize();
render();
initCloudSync();

</script>
